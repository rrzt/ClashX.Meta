name: 自动同步原仓库更新
on:
  # 定时执行：每天北京时间16:00、凌晨2:00同步
  schedule:
    - cron: '0 8 * * *'   # UTC时间8点 → 北京时间16点
    - cron: '0 18 * * *'  # UTC时间18点 → 北京时间凌晨2点
  # 手动触发（方便测试）
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    # 失败时不中断（可选，根据需求调整）
    continue-on-error: false
    steps:
      # 1. 拉取你的Fork仓库代码（增强凭证和分支兼容性）
      - name: 克隆仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取所有历史记录（必须，否则合并会失败）
          ref: master  # 若你的主分支是main，需改成main
          persist-credentials: true  # 保留凭证
          token: ${{ secrets.GITHUB_TOKEN }}  # 显式指定token，提升稳定性

      # 2. 配置Git用户信息（避免提交时身份验证失败）
      - name: 配置Git用户
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      # 3. 添加原仓库为上游仓库（容错处理）
      - name: 设置上游仓库
        run: |
          # 先删除已存在的upstream，避免重复添加报错
          git remote remove upstream || echo "upstream不存在，跳过删除"
          # 添加原仓库作为上游
          git remote add upstream https://github.com/MetaCubeX/ClashX.Meta.git
          # 拉取上游所有分支的最新代码
          git fetch upstream --all --prune

      # 4. 合并原仓库更新（优化冲突处理逻辑）
      - name: 合并上游更新
        run: |
          # 切换到目标分支，不存在则创建
          git checkout master || git checkout -b master
          # 拉取本地分支最新代码
          git pull origin master --no-edit
          # 尝试合并上游master分支
          if git merge upstream/master --no-edit; then
            echo "合并成功，准备推送"
          else
            echo "合并冲突，自动放弃合并并终止任务"
            # 放弃合并，退出任务（避免推送冲突代码）
            git merge --abort
            exit 1
          fi

      # 5. 推送更新到Fork仓库（增加重试机制）
      - name: 推送更新到Fork仓库
        run: |
          # 重试3次，避免网络波动导致推送失败
          for i in {1..3}; do
            git push origin master && break
            echo "推送失败，第$i次重试..."
            sleep 5
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
